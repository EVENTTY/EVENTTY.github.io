<div class="masthead">
  <div class="masthead__inner-wrap">
    <div class="masthead__menu">
      <nav id="site-nav" class="greedy-nav">
        <a class="site-title" href="{{ '/' | absolute_url }}">
          <img src="/images/minilogo.png" width="32" height="32" alt="Eventty logo">
          <span>Home</span>
        </a>
        <button class="nav-toggle" type="button" aria-label="Toggle menu" aria-expanded="false">
          <span class="navicon"></span>
        </button>
        <ul class="visible-links">
          {%- for link in site.data.navigation.main -%}
            {%- if link.url contains '://' -%}
              {%- assign url = link.url -%}
            {%- else -%}
              {%- assign url = link.url | relative_url -%}
            {%- endif -%}
            <li class="masthead__menu-item{% if page.url == url or (url != '/' and page.url contains url) %} masthead__menu-item--active{% endif %}">
              <a href="{{ url }}" {% if link.description %}title="{{ link.description }}"{% endif %}>{{ link.title }}</a>
            </li>
          {%- endfor -%}
        </ul>
      </nav>
    </div>
  </div>
  <div class="nav-overlay"></div>
</div>

<script>
  (function() {
    var toggle = document.querySelector('.nav-toggle');
    var links  = document.querySelector('.visible-links');
    var overlay = document.querySelector('.nav-overlay');
    var masthead = document.querySelector('.masthead');
    if (!toggle || !links || !overlay) return;

    function updateTop() {
      if (masthead) {
        links.style.top = masthead.offsetHeight + 'px';
      }
    }
    updateTop();
    window.addEventListener('resize', updateTop);

    function openMenu() {
      updateTop();
      links.classList.add('is-open');
      overlay.classList.add('is-open');
      toggle.classList.add('is-active');
      toggle.setAttribute('aria-expanded', 'true');
      document.body.style.overflow = 'hidden';
    }
    function closeMenu() {
      links.classList.remove('is-open');
      overlay.classList.remove('is-open');
      toggle.classList.remove('is-active');
      toggle.setAttribute('aria-expanded', 'false');
      document.body.style.overflow = '';
    }

    toggle.addEventListener('click', function() {
      links.classList.contains('is-open') ? closeMenu() : openMenu();
    });
    overlay.addEventListener('click', closeMenu);
    links.addEventListener('click', function(e) {
      if (e.target.tagName === 'A') closeMenu();
    });
    // ESC to close
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape' && links.classList.contains('is-open')) closeMenu();
    });
  })();
</script>
