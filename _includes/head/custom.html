<!-- Enable safe-area-inset for iPhone notch/home indicator -->
<script>
  (function() {
    var vp = document.querySelector('meta[name="viewport"]');
    if (vp && !vp.content.includes('viewport-fit')) {
      vp.content = vp.content + ', viewport-fit=cover';
    }
  })();
</script>
